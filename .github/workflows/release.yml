name: Quimera Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.api -t ghcr.io/${{ github.repository_owner }}/quimera-api:${{ env.VERSION }} .
          docker build -f Dockerfile -t ghcr.io/${{ github.repository_owner }}/quimera:${{ env.VERSION }} .
          docker tag ghcr.io/${{ github.repository_owner }}/quimera-api:${{ env.VERSION }} ghcr.io/${{ github.repository_owner }}/quimera-api:latest
          docker tag ghcr.io/${{ github.repository_owner }}/quimera:${{ env.VERSION }} ghcr.io/${{ github.repository_owner }}/quimera:latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/quimera-api:${{ env.VERSION }}
          docker push ghcr.io/${{ github.repository_owner }}/quimera-api:latest
          docker push ghcr.io/${{ github.repository_owner }}/quimera:${{ env.VERSION }}
          docker push ghcr.io/${{ github.repository_owner }}/quimera:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Quimera MarkX ${{ env.VERSION }}"
          body: |
            ## Quimera MarkX ${{ env.VERSION }}
            
            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/quimera:${{ env.VERSION }}
            docker run -v $(pwd):/workspace ghcr.io/${{ github.repository_owner }}/quimera:${{ env.VERSION }} repair /workspace
            ```
            
            ### pip
            ```bash
            pip install git+https://github.com/${{ github.repository }}.git@${{ github.ref }}
            ```
          generate_release_notes: true
