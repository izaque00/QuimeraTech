# Prometheus configuration for Quimera monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'quimera-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'quimera-api'

  - job_name: 'quimera-workers'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['worker:8000']
        labels:
          service: 'quimera-worker'
